model:
  system_prompt_files:
    - ".antigravity/brain/task.md"
    - ".antigravity/brain/implementation_plan.md"

mcp:
  servers:
    context7:
      transport: stdio
      command: context7-mcp

rules:
  - name: auto-context7
    when:
      any:
        - input_regex: "&gpio"
        - input_regex: "&i2c"
        - input_regex: "#include"
        - input_regex: "```"
        - input_regex: "behavior"
        - input_regex: "cmakelists"
        - input_regex: "combo"
        - input_regex: "CONFIG_"
        - input_regex: "device tree"
        - input_regex: "dt_binding"
        - input_regex: "dtsi?"
        - input_regex: "gpio"
        - input_regex: "hold-tap"
        - input_regex: "i2c"
        - input_regex: "include"
        - input_regex: "kconfig"
        - input_regex: "keymap"
        - input_regex: "prj.conf"
        - input_regex: "west"
        - input_regex: "zephyr"
        - input_regex: "zmk"
    then:
      invoke_mcp:
        server: context7


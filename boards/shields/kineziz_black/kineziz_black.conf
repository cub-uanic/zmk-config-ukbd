# WeAct BlackPill F411CE UF2 bootloader configuration
# The UF2 bootloader occupies the first 64KB (0x10000) of flash
CONFIG_ROM_START_OFFSET=0x10000

# Build output: generate both BIN and UF2
CONFIG_BUILD_OUTPUT_BIN=y
CONFIG_BUILD_OUTPUT_UF2=y

# STM32F4 UF2 family ID (0x57755a57)
# Required for WeAct UF2 bootloader compatibility
CONFIG_BUILD_OUTPUT_UF2_FAMILY_ID="0x57755a57"

